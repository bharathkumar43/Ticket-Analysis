server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api to the backend service ───────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3600/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large monthly Excel uploads (up to 25 MB)
        client_max_body_size 25m;
        proxy_read_timeout   120s;
    }

    # ── SPA routing (React Router / Vite) ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache hashed static assets forever ───────────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_min_length 1000;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml;
}
